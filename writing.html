<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>TCF 法语写作练习</title>
  <link rel="stylesheet" href="writing.css?v=20260712.4" />
  <link rel="stylesheet" href="site-nav.css?v=20260712.4" />
  <link rel="stylesheet" href="study-tools.css?v=20260712.4" />
</head>
<body>
  <nav class="site-switcher" aria-label="学习页面切换">
    <a href="t1.html?v=20260712.4">T1 自我介绍</a>
    <a href="t2.html?v=20260712.4">T2 口语</a>
    <a href="index.html?v=20260712.4">T3 口语</a>
    <a class="active" href="writing.html?v=20260712.4">写作练习</a>
  </nav>
  <main class="writing-app">
    <section class="editor-card">
      <div class="toolbar">
        <div class="tabs" role="tablist" aria-label="写作功能">
          <button class="tab is-active" id="practiceTab" type="button" role="tab" aria-selected="true">写作练习</button>
          <button class="tab" id="templateTab" type="button" role="tab" aria-selected="false">范文模板 <span>AI</span></button>
        </div>
        <div class="toolbar-actions">
          <button class="icon-button" id="undoBtn" type="button" title="撤销" aria-label="撤销">↶</button>
          <button class="icon-button" id="redoBtn" type="button" title="重做" aria-label="重做">↷</button>
          <span class="divider"></span>
          <button class="secondary-button" id="newWritingBtn" type="button">＋ 新建文章</button>
          <button class="secondary-button" id="saveBtn" type="button">▣ 保存</button>
          <button class="submit-button" id="submitBtn" type="button">➤ 提交批改</button>
        </div>
      </div>

      <div class="task-selector" aria-label="选择写作任务">
        <span>练习题型</span>
        <button class="task-button is-active" type="button" data-task="1" data-min="60" data-max="120">Tâche 1 <small>60–120 词</small></button>
        <button class="task-button" type="button" data-task="2" data-min="120" data-max="150">Tâche 2 <small>120–150 词</small></button>
        <button class="task-button" type="button" data-task="3" data-min="150" data-max="180">Tâche 3 <small>150–180 词</small></button>
        <em>仅作参考，不限制输入或提交</em>
      </div>

      <div class="character-toolbar">
        <div class="character-heading">
          <strong>特殊字符</strong>
          <button id="caseToggle" type="button">小写</button>
        </div>
        <div class="characters" id="characterButtons" aria-label="法语特殊字符"></div>
      </div>

      <div class="panel is-active" id="practicePanel" role="tabpanel">
        <div class="writing-document-tools">
          <input id="writingTitle" type="text" placeholder="Titre (par exemple : Tâche 2 — Invitation)" />
          <div class="text-color-tools" aria-label="字体颜色"><span>字体颜色</span><button type="button" data-color="#dc2626" title="红色" style="--color:#dc2626"></button><button type="button" data-color="#2563eb" title="蓝色" style="--color:#2563eb"></button><button type="button" data-color="#16a34a" title="绿色" style="--color:#16a34a"></button><button type="button" data-color="#ea580c" title="橙色" style="--color:#ea580c"></button><button type="button" data-color="#9333ea" title="紫色" style="--color:#9333ea"></button><button type="button" data-color="#263246" title="黑色" style="--color:#263246"></button></div>
        </div>
        <label class="sr-only" for="writingEditor">法语写作内容</label>
        <div id="writingEditor" class="writing-rich-editor" contenteditable="true" spellcheck="true" lang="fr" data-gramm="true" data-gramm_editor="true" data-placeholder="Commencez votre entraînement à l’écriture…"></div>
      </div>

      <div class="panel template-panel" id="templatePanel" role="tabpanel" hidden>
        <label class="template-content-label" for="templateEditor">录入需要对照的完整模板</label>
        <textarea id="templateEditor" lang="fr" placeholder="Collez ou saisissez votre modèle en français ici…"></textarea>
        <p class="template-tip">系统会比较固定模板句是否出现，不要求你的主题词和例子与模板完全相同。</p>
      </div>

      <footer class="status-bar">
        <strong id="wordCount">0 词</strong>
        <span id="wordRequirement">（参考：60–120 词）</span>
        <span id="saveStatus">草稿会自动保存</span>
        <span>写作练习，模拟考试场景</span>
      </footer>
      <div class="grammar-tools-note">
        <span><strong>Grammarly 兼容：</strong>安装并启用浏览器扩展后，会直接在写作框中显示检查建议；提交后仍可查看本页的法语语法建议。</span>
        <a href="https://support.grammarly.com/hc/en-us/articles/115000091552-How-to-install-the-Grammarly-browser-extension" target="_blank" rel="noopener noreferrer">安装说明 ↗</a>
      </div>
    </section>

    <section class="writing-library" id="writingLibrarySection">
      <div class="writing-library-heading"><div><p class="eyebrow">MES TEXTES</p><h2>我的写作练习库</h2><p>保存后可随时载入，继续修改、高亮和批注。</p></div><label>排列方式<select id="writingSort"><option value="newest">最新练习</option><option value="oldest">最早练习</option><option value="task">按 Tâche</option><option value="title">按标题</option></select></label></div>
      <div id="savedWritingList" class="saved-writing-list"></div>
    </section>

    <section class="results" id="resultsPanel" hidden>
      <div class="result-heading">
        <div>
          <p class="eyebrow">RÉSULTATS</p>
          <h2>写作检查结果</h2>
        </div>
        <div class="score" id="overallScore">—</div>
      </div>
      <div class="result-grid">
        <article class="result-card">
          <h3>模板一致性</h3>
          <div id="templateResult"></div>
        </article>
        <article class="result-card">
          <h3>语法与书写建议</h3>
          <div id="grammarResult"></div>
        </article>
      </div>
    </section>
  </main>
  <script src="writing.js?v=20260712.4"></script>
  <script src="study-tools.js?v=20260712.4"></script>
  <script src="french-only.js?v=20260712.4"></script>
  <script src="module-collapse.js?v=20260712.4"></script>
</body>
</html>
